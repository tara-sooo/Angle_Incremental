<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angle Incremental</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="stage-panel" aria-label="Angle Incremental">
        <header class="topbar">
          <div>
            <p class="eyebrow">Angle Incremental</p>
            <h1>The Angle</h1>
          </div>
          <div class="generation-status" id="generationStatus">世代 未解放</div>
        </header>

        <div class="playfield-wrap">
          <canvas id="gameCanvas" width="900" height="620" aria-label="The Angle のプレイ領域"></canvas>
        </div>
      </section>

      <aside class="control-panel" aria-label="操作と統計">
        <section class="stats">
          <div class="metric primary">
            <span>スコア</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="metric">
            <span>核到達時の獲得量</span>
            <strong id="gainValue">1</strong>
          </div>
          <div class="metric">
            <span>頂点通過ごとの増加</span>
            <strong id="vertexGainValue">+0.01</strong>
          </div>
          <div class="metric">
            <span>1周の時間</span>
            <strong id="lapValue">6.00秒</strong>
          </div>
        </section>

        <section class="upgrades" aria-label="The Angle の強化">
          <button id="speedUpgrade" class="upgrade-button" type="button">
            <span>
              <b>周回速度</b>
              <small id="speedLevel">レベル0</small>
            </span>
            <em id="speedCost">必要 25</em>
          </button>
          <button id="vertexUpgrade" class="upgrade-button" type="button">
            <span>
              <b>角の追加</b>
              <small id="vertexCount">3頂点</small>
            </span>
            <em id="vertexCost">必要 50</em>
          </button>
          <button id="gainUpgrade" class="upgrade-button" type="button">
            <span>
              <b>頂点獲得量</b>
              <small id="gainLevel">レベル0</small>
            </span>
            <em id="gainCost">必要 75</em>
          </button>
        </section>

        <section class="generation">
          <div>
            <span>世代</span>
            <strong id="generationCount">0</strong>
          </div>
          <div>
            <span>スコア倍率</span>
            <strong id="generationMultiplier">×1.00</strong>
          </div>
          <div>
            <span>コスト倍率</span>
            <strong id="generationCostFactor">×1.00</strong>
          </div>
          <button id="generationButton" class="generation-button" type="button" disabled>
            世代交代
          </button>
        </section>

        <section class="core-boost">
          <div>
            <span>核増幅</span>
            <strong id="coreBoostCount">0</strong>
          </div>
          <div>
            <span>必要スコア</span>
            <strong id="coreBoostRequirement">1.00e20</strong>
          </div>
          <div>
            <span>増加倍率</span>
            <strong id="coreBoostGainBoost">×1.00</strong>
          </div>
          <div>
            <span>獲得指数</span>
            <strong id="coreBoostExponent">^1.00</strong>
          </div>
          <button id="coreBoostButton" class="core-boost-button" type="button" disabled>
            核増幅
          </button>
        </section>

        <section class="infinity-panel">
          <div>
            <span>Infinity</span>
            <strong id="infinityCount">0</strong>
          </div>
          <div>
            <span>Infinity Point</span>
            <strong id="infinityPoints">0</strong>
          </div>
          <div>
            <span>Infinite Score</span>
            <strong id="infiniteScore">0</strong>
          </div>
          <div>
            <span>Infinite Angle倍率</span>
            <strong id="infiniteAngleBoost">×1.00</strong>
          </div>
          <div>
            <span>Infinity獲得</span>
            <strong id="infinityPointGain">+0 IP</strong>
          </div>
          <button id="infinityButton" class="infinity-button" type="button" disabled>
            Infinity
          </button>
          <div class="upgrade-row">
            <button id="ipGainUpgrade" class="mini-button" type="button" disabled>IP倍率</button>
            <strong id="ipGainUpgradeCost">1 IP</strong>
          </div>
          <div class="upgrade-row">
            <button id="infiniteAngleUpgrade" class="mini-button" type="button" disabled>IA効率</button>
            <strong id="infiniteAngleUpgradeCost">2 IP</strong>
          </div>
          <div class="upgrade-row">
            <button id="softcapUpgrade" class="mini-button" type="button" disabled>軟上限緩和</button>
            <strong id="softcapUpgradeCost">4 IP</strong>
          </div>
          <div class="upgrade-row">
            <button id="convertIpButton" class="mini-button" type="button" disabled>IPをIAへ</button>
            <strong id="convertIpGain">+0</strong>
          </div>
          <div class="upgrade-row">
            <button id="challengeButton" class="mini-button" type="button">IC開始</button>
            <strong id="challengeStatus">未挑戦</strong>
          </div>
          <button id="breakCapButton" class="break-button" type="button" disabled>
            Break Infinite Cap
          </button>
        </section>

        <section class="save-panel" aria-label="セーブデータ">
          <div>
            <span>セーブ</span>
            <strong id="saveStatus">未保存</strong>
          </div>
          <button id="resetSaveButton" class="reset-button" type="button">
            セーブをリセット
          </button>
        </section>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
