name: Regression Suite

on:
  pull_request:
    branches:
      - main
      - next
      - "release/**"
  push:
    branches:
      - main
      - next
      - "release/**"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify baseline fixture
        run: node scripts/check-runtime-baseline.js
      - name: Verify ESM entrypoint order
        run: node scripts/check-runtime-esm-loader-order.js
      - name: Check syntax
        run: |
          node --check game.js
          node --check regression-tests-esm.js
          node --check regression-tests-core.js
          find src scripts tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Run baseline regression and ESM differential suites
        run: node --experimental-vm-modules regression-tests-esm.js
      - name: Install Chromium for browser smoke test
        run: |
          npm install --no-save --ignore-scripts playwright
          npx playwright install --with-deps chromium
      - name: Run browser ESM smoke test
        run: node tests/browser-smoke.mjs
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: |
            browser-smoke-report.json
            regression-failure.txt
            gr-delay-sweep-first-infinity-audit-report.json
          if-no-files-found: warn
