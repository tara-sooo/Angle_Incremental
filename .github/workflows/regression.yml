name: Regression Suite

on:
  pull_request:
    branches:
      - next

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check syntax
        run: |
          node --check game.js
          node --check src/runtime/core.js
          node --check src/data/state-schema.js
          node --check src/data/progression-definitions.js
          node --check src/data/balance-profile.js
          node --check src/systems/state-schema-runtime.js
          node --check src/systems/balance-formulas.js
          node --check src/systems/balance-runtime.js
          node --check src/systems/progression-data-runtime.js
          node --check regression-tests.js
          node --check regression-tests-core.js
          node --check regression-tests-modules.js
      - name: Run regression suite
        run: node regression-tests-modules.js
