name: Validate PR 12

on:
  pull_request_target:
    types: [reopened]
    branches:
      - next

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'refactor/game-js-single-source-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tara-sooo/Angle_Incremental
          ref: refactor/game-js-single-source-final
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Replace the obsolete IC7 expectation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          core_path = Path('regression-tests-core.js')
          source = core_path.read_text(encoding='utf-8')
          old = '''function testIc7LocksByScoreAndRewardRequiresAffordableCost() {
  const context = loadGame();
  const { state, buySpeed } = context.window.__angleDebug;
  state.activeChallenge = 7;
  state.scoreLog10 = 30;
  state.speedLevel = 0;
  assert.strictEqual(context.canBuyNormalUpgrade("speed"), true);

  state.scoreLog10 = 30.001;
  assert.strictEqual(context.canBuyNormalUpgrade("speed"), false);

  state.activeChallenge = 0;
  state.completedChallenges = 1 << 6;
  state.scoreLog10 = 0;
  state.speedLevel = 10;
  const lockedLevel = state.speedLevel;
  buySpeed();
  assert.strictEqual(state.speedLevel, lockedLevel);

  state.speedLevel = 0;
  state.scoreLog10 = 2;
  const beforeScore = state.scoreLog10;
  buySpeed();
  assert.strictEqual(state.speedLevel, 1);
  assert.strictEqual(state.scoreLog10, beforeScore);
}'''
          new = '''function testIc7LocksByPriceAndRewardRequiresAffordableCost() {
  const context = loadGame();
  const { state, buySpeed } = context.window.__angleDebug;
  state.activeChallenge = 7;
  state.scoreLog10 = 100;
  state.speedLevel = 0;
  assert.strictEqual(context.canBuyNormalUpgrade("speed"), true);

  state.speedLevel = 160;
  assert.strictEqual(context.canBuyNormalUpgrade("speed"), false);

  state.activeChallenge = 0;
  state.completedChallenges = 1 << 6;
  state.scoreLog10 = 0;
  state.speedLevel = 10;
  const lockedLevel = state.speedLevel;
  buySpeed();
  assert.strictEqual(state.speedLevel, lockedLevel);

  state.speedLevel = 0;
  state.scoreLog10 = 2;
  const beforeScore = state.scoreLog10;
  buySpeed();
  assert.strictEqual(state.speedLevel, 1);
  assert.strictEqual(state.scoreLog10, beforeScore);
}'''
          if old not in source:
              raise SystemExit('obsolete IC7 regression block not found')
          source = source.replace(old, new, 1)
          source = source.replace('  testIc7LocksByScoreAndRewardRequiresAffordableCost();', '  testIc7LocksByPriceAndRewardRequiresAffordableCost();', 1)
          core_path.write_text(source, encoding='utf-8')
          Path('regression-tests.js').write_text("require('./regression-tests-core.js');\n", encoding='utf-8')
          PY
      - name: Run regression suite
        run: |
          node --check game.js
          node --check regression-tests.js
          node --check regression-tests-core.js
          node regression-tests.js
      - name: Commit tested fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add regression-tests.js regression-tests-core.js
          git commit -m "test: align IC7 regression with price cap"
          git push
      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment 12 --repo tara-sooo/Angle_Incremental --body "✅ `node regression-tests.js` passed after replacing the stale IC7 score-threshold expectation with the current price-threshold test."