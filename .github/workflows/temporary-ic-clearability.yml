name: Temporary IC clearability validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - balance/0-1-0-first-infinity-pace

concurrency:
  group: ic-clearability-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check ic-clearability-tests.js
      - run: node ic-clearability-tests.js
