name: Align Semantic Version

on:
  pull_request_target:
    types: [reopened]
    branches:
      - next

permissions:
  contents: write

jobs:
  align:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'refactor/game-js-single-source-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true
      - name: Align runtime and manifest versions
        run: |
          python3 - <<'PY'
          from pathlib import Path

          game_path = Path("game.js")
          game = game_path.read_text(encoding="utf-8")
          old = 'const APP_VERSION = "2026.06.22-ic-gr-rebalance";'
          new = 'const APP_VERSION = "0.1.0";'
          if old not in game:
              raise SystemExit("expected APP_VERSION declaration was not found")
          game_path.write_text(game.replace(old, new, 1), encoding="utf-8")
          Path("version.json").write_text('{\n  "appVersion": "0.1.0"\n}\n', encoding="utf-8")
          PY
          node --check game.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.js version.json
          git commit -m "chore: align release version to 0.1.0"
          git push
