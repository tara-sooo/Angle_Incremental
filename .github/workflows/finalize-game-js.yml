name: Finalize Game JS Entrypoint

on:
  push:
    branches:
      - refactor/core-balance-integration

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Make game.js the sole engine source
        run: |
          python3 - <<'PY'
          from pathlib import Path

          test_path = Path("regression-tests-core.js")
          source = test_path.read_text(encoding="utf-8")
          old_name = "function testIc7LocksByScoreAndRewardRequiresAffordableCost()"
          next_name = "function testIc8StartsAtThreeAndPreservesVerticesDuringChallengeAndReward()"
          start = source.find(old_name)
          end = source.find(next_name, start)
          if start < 0 or end < 0:
              raise SystemExit("IC7 regression block not found")
          replacement = '''function testIc7LocksByPriceAndRewardRequiresAffordableCost() {
  const context = loadGame();
  const { state, buySpeed } = context.window.__angleDebug;
  state.activeChallenge = 7;
  state.scoreLog10 = 100;
  state.speedLevel = 0;
  assert.strictEqual(context.canBuyNormalUpgrade("speed"), true);

  state.speedLevel = 160;
  assert.strictEqual(context.canBuyNormalUpgrade("speed"), false);

  state.activeChallenge = 0;
  state.completedChallenges = 1 << 6;
  state.scoreLog10 = 0;
  state.speedLevel = 10;
  const lockedLevel = state.speedLevel;
  buySpeed();
  assert.strictEqual(state.speedLevel, lockedLevel);

  state.speedLevel = 0;
  state.scoreLog10 = 2;
  const beforeScore = state.scoreLog10;
  buySpeed();
  assert.strictEqual(state.speedLevel, 1);
  assert.strictEqual(state.scoreLog10, beforeScore);
}

'''
          test_path.write_text(source[:start] + replacement + source[end:], encoding="utf-8")

          Path("game.js").write_text(Path("game-core.js").read_text(encoding="utf-8"), encoding="utf-8")
          Path("regression-tests.js").write_text(
              "require('./regression-tests-core.js');\n",
              encoding="utf-8",
          )
          Path("version.json").write_text(
              '{\n  "appVersion": "2026.06.25-iu-core"\n}\n',
              encoding="utf-8",
          )
          PY
          rm -f game-core.js balance-config.js balance-regression-tests.js core-integration-check.js core-integration-validation.txt
          rm -f .github/workflows/integrate-core-balance.yml .github/workflows/verify-core-integration.yml .github/workflows/update-ic7-regression.yml .github/workflows/run-validation.yml .github/workflows/finalize-game-js.yml
          rmdir .github/workflows 2>/dev/null || true
      - name: Validate renamed engine
        run: |
          node --check game.js
          node --check regression-tests.js
          node --check regression-tests-core.js
          node regression-tests.js
      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: make game.js the sole engine source"
          git push
