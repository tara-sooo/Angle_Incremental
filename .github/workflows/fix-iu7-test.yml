name: Fix IU 7-2 Regression

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix-test:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'release/0.1.0-single-source'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Correct the IU 7-2 assertion
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('regression-tests-core.js')
          text = path.read_text(encoding='utf-8')
          old = '''    state.infinityCount = 50;
    state.generationCount = 0;
    state.generationCostFactor = 1;
    const baseCostLog = Math.log10(5);
    assert.ok(Math.abs(context.costLog10("speed", 5, 0, 1.55) - baseCostLog * 0.9) < 1e-12);'''
          new = '''    state.generationCount = 0;
    state.generationCostFactor = 1;
    state.infinityCount = 0;
    const baselineCostLog = context.costLog10("speed", 5, 0, 1.55);
    state.infinityCount = 50;
    const reducedCostLog = context.costLog10("speed", 5, 0, 1.55);
    assert.ok(Math.abs(reducedCostLog / baselineCostLog - 0.9) < 1e-12);'''
          if old not in text:
              raise SystemExit('IU 7-2 assertion block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          node regression-tests.js
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add regression-tests-core.js
          git commit -m 'test: correct IU 7-2 cost exponent expectation'
          git push
