name: Correct Regression
on:
  pull_request:
    types: [opened]
permissions:
  contents: write
jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'release/0.1.0-single-source'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('regression-tests-core.js')
          s = p.read_text()
          s = s.replace('''    state.infinityCount = 50;\n    state.generationCount = 0;\n    state.generationCostFactor = 1;\n    const baseCostLog = Math.log10(5);\n    assert.ok(Math.abs(context.costLog10("speed", 5, 0, 1.55) - baseCostLog * 0.9) < 1e-12);''', '''    state.generationCount = 0;\n    state.generationCostFactor = 1;\n    state.infinityCount = 0;\n    const baselineCostLog = context.costLog10("speed", 5, 0, 1.55);\n    state.infinityCount = 50;\n    const reducedCostLog = context.costLog10("speed", 5, 0, 1.55);\n    assert.ok(Math.abs(reducedCostLog / baselineCostLog - 0.9) < 1e-12);''', 1)
          p.write_text(s)
          PY
          node regression-tests.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add regression-tests-core.js
          git commit -m 'test: correct IU 7-2 cost exponent expectation'
          git push
